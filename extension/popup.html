<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Proxy</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-row">
        <span class="title">Chrome Proxy</span>
        <div class="status-dot" id="status-dot"></div>
      </div>
      <div class="status-text" id="status-text">Loading…</div>
    </div>

    <div class="info-row" id="port-row" style="display:none">
      <span class="info-label">Listening on</span>
      <span class="info-value" id="port-display">:8080</span>
    </div>

    <div class="error-box" id="error-box" style="display:none"></div>

    <button class="btn" id="toggle-btn" disabled>…</button>

    <div class="log-section">
      <div class="log-header">
        <span>Recent Traffic</span>
        <span class="log-count" id="log-count">0 requests</span>
      </div>
      <div class="log-list" id="log-list">
        <div class="log-empty">No traffic yet</div>
      </div>
    </div>

    <div class="footer">
      <a href="#" id="open-options">Open Settings &amp; Full Log →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
